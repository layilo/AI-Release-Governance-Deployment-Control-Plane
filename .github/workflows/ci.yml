name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Lint
        run: make lint
      - name: Unit tests
        run: make test
      - name: Demo release success
        run: make demo
      - name: Demo blocked release
        run: make blocked
      - name: Demo rollback release
        run: make rollback
      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            reports
            state
